<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="renderer" content="webkit">
    <title>考勤管理</title>
    <link rel="shortcut icon" href="/favicon.ico">
    <link rel="stylesheet" href="/css/bootstrap.min.css">
    <link rel="stylesheet" href="/css/font-awesome.min.css">
    <link rel="stylesheet" href="/css/animate.min.css">
    <link rel="stylesheet" href="/css/style.min.css">
    <script src="/js/jquery.min.js"></script>
    <script src="/js/bootstrap.min.js"></script>
    <style>
        body { background-color: #f3f3f6; }
        .attendance-header {
            background: white;
            padding: 20px 25px;
            margin-bottom: 20px;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin: 0;
        }
        .btn-back {
            padding: 6px 16px;
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            border-radius: 3px;
        }
        .section-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .section-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: white;
            margin: 0;
        }
        .section-icon {
            margin-right: 10px;
        }
        .search-area {
            padding: 20px;
            background: #f8f9fa;
            border-bottom: 1px solid #e9ecef;
        }
        .search-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .search-item {
            flex: 1;
            min-width: 200px;
        }
        .search-item label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #555;
        }
        .search-item input {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        .search-item input:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
            outline: none;
        }
        .search-buttons {
            padding: 15px 20px;
            display: flex;
            gap: 10px;
            justify-content: center;
        }
        .btn-search {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 10px 24px;
            border-radius: 6px;
            min-width: 100px;
        }
        .btn-search:hover {
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
            transform: translateY(-1px);
        }
        .btn-refresh {
            background: #f0f0f0;
            border: 1px solid #e0e0e0;
            color: #333;
            padding: 10px 24px;
            border-radius: 6px;
            min-width: 100px;
        }
        .btn-refresh:hover {
            background: #e8e8e8;
        }
        .table-container {
            padding: 0 20px;
        }
        .data-table {
            margin: 0;
            border-collapse: collapse;
        }
        .data-table thead {
            background: #f8f9fa;
        }
        .data-table th {
            padding: 14px;
            font-weight: 600;
            color: #555;
            border-bottom: 2px solid #e9ecef;
            text-align: center;
        }
        .data-table tbody tr {
            transition: all 0.2s;
        }
        .data-table tbody tr:hover {
            background: #f0f7ff !important;
        }
        .data-table td {
            padding: 12px 14px;
            border-bottom: 1px solid #e9ecef;
            text-align: center;
            color: #333;
        }
        .data-table tr:nth-child(even) td {
            background: #fafbfc;
        }
        .data-table .empty-state {
            text-align: center;
            color: #999;
            padding: 40px 20px;
            font-size: 14px;
        }
        .punch-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            margin-bottom: 20px;
            overflow: hidden;
        }
        .punch-icon {
            font-size: 48px;
            color: #667eea;
            margin-bottom: 20px;
        }
        .punch-button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            color: white;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
        }
        .punch-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 16px rgba(102, 126, 234, 0.3);
        }
        .punch-hint {
            text-align: center;
            color: #999;
            padding: 20px;
            margin-top: 15px;
        }
    </style>
</head>
<body class="gray-bg">
<div style="padding: 20px;">
    <!-- 头部 -->
    <div class="attendance-header">
        <div>
            <h3 class="page-title"><i class="fa fa-calendar-check-o" style="margin-right: 10px; color: #667eea;"></i>考勤管理</h3>
        </div>
        <button class="btn btn-back" onclick="window.parent.location.reload()">
            <i class="fa fa-arrow-left"></i> 返回
        </button>
    </div>

    <!-- 主体 -->
    <div class="row">
        <!-- 左侧：打卡记录 -->
        <div class="col-md-5">
            <div class="section-card">
                <div class="section-header">
                    <div>
                        <i class="fa fa-list-alt section-icon"></i>
                        <span class="section-title">打卡记录</span>
                    </div>
                </div>
                <div class="search-area">
                    <div class="search-row">
                        <div class="search-item">
                            <label>用户名</label>
                            <input type="text" id="username" class="form-control" placeholder="请输入用户名"/>
                        </div>
                        <div class="search-item">
                            <label>日期范围</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="date" id="startDate" class="form-control" placeholder="开始日期" style="flex: 1;"/>
                                <span style="display: flex; align-items: center; color: #999;">至</span>
                                <input type="date" id="endDate" class="form-control" placeholder="结束日期" style="flex: 1;"/>
                            </div>
                        </div>
                    </div>
                    <div class="search-buttons">
                        <button class="btn btn-search" onclick="searchRecords()">
                            <i class="fa fa-search"></i> 查询
                        </button>
                        <button class="btn btn-refresh" onclick="refreshRecords()">
                            <i class="fa fa-refresh"></i> 刷新
                        </button>
                    </div>

                    <!-- 打卡记录表格 -->
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr>
                                    <th width="10%">序号</th>
                                    <th width="20%">用户名</th>
                                    <th width="15%">打卡时间</th>
                                    <th width="15%">体温</th>
                                    <th width="35%">地址</th>
                                    <th width="15%">打卡日期</th>
                                </tr>
                            </thead>
                            <tbody id="attendanceBody">
                                <tr>
                                    <td colspan="5" class="empty-state">点击刷新按钮加载打卡记录</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧：打卡服务 -->
        <div class="col-md-7">
            <div class="punch-card">
                <div class="section-header">
                    <div>
                        <i class="fa fa-clock-o section-icon"></i>
                        <span class="section-title">打卡服务</span>
                    </div>
                </div>
                <div class="box-body" style="padding: 40px;">
                    <div class="text-center">
                        <button class="punch-button" onclick="goTo8080()">
                            <i class="fa fa-location-arrow"></i>&nbsp;前往打卡
                        </button>
                    </div>
                    <p class="punch-hint">
                        <i class="fa fa-info-circle"></i> 点击上方按钮跳转到 8080 端口打卡服务
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 页面脚本 -->
<script>
    function goTo8080() {
        window.open('http://localhost:8080', '_blank');
    }

    function searchRecords() {
        var username = $('#username').val();
        var startDate = $('#startDate').val();
        var endDate = $('#endDate').val();

        $.post('/system/attendance/data', {
            username: username,
            startTime: startDate,
            endTime: endDate
        }, function(result) {
            if (result.code == 0 && result.rows && result.rows.length > 0) {
                renderTable(result.rows);
            } else {
                $('#attendanceBody').html('<tr><td colspan="5" class="empty-state"><i class="fa fa-inbox"></i> 暂无打卡记录</td></tr>');
            }
        }).fail(function() {
            $('#attendanceBody').html('<tr><td colspan="5" class="empty-state"><i class="fa fa-exclamation-triangle"></i> 查询失败，请检查服务状态</td></tr>');
        });
    }

    function refreshRecords() {
        $('#attendanceBody').html('<tr><td colspan="5" class="empty-state"><i class="fa fa-spinner fa-spin"></i> 加载中...</td></tr>');
        searchRecords();
    }

    function renderTable(data) {
        var html = '';
        if (data && data.length > 0) {
            for (var i = 0; i < data.length; i++) {
                var item = data[i];
                html += '<tr>';
                html += '<td>' + (i + 1) + '</td>';
                html += '<td>' + (item.username || '-') + '</td>';
                html += '<td>' + (item.temperature || '-') + '</td>';
                html += '<td>' + (item.temperature || '-') + '</td>';
                html += '<td>' + (item.address || '-') + '</td>';
                html += '<td>' + (item.date || '-') + '</td>';
                html += '</tr>';
            }
        } else {
            html += '<tr><td colspan="5" class="empty-state"><i class="fa fa-inbox"></i> 暂无打卡记录</td></tr>';
        }
        $('#attendanceBody').html(html);
    }

    $(function() {
        searchRecords();
    });
</script>
</body>
</html>

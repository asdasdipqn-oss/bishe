<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
	<th:block th:include="include :: header('新增用户')" />
	<th:block th:include="include :: select2-css" />
</head>
<body>
    <div class="main-content">
        <form id="form-user-add" class="form-horizontal">
            <h4 class="form-header h4">基本信息</h4>
            <div class="row">
            	<div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">用户名称：</label>
                        <div class="col-sm-8">
                            <input name="userName" placeholder="请输入用户名称" class="form-control" type="text" maxlength="30" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">归属部门：</label>
                        <div class="col-sm-8">
                            <select name="deptId" id="treeId" class="form-control" required>
                                <option value="">请选择部门</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">手机号码：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="phonenumber" name="phonenumber" placeholder="请输入手机号码" class="form-control" type="text" maxlength="11">
                                <span class="input-group-addon"><i class="fa fa-mobile"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">邮箱：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="email" name="email" class="form-control email" type="text" maxlength="50" placeholder="请输入邮箱">
                                <span class="input-group-addon"><i class="fa fa-envelope"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">登录账号：</label>
                        <div class="col-sm-8">
                            <input id="loginName" name="loginName" placeholder="请输入登录账号" class="form-control" type="text" maxlength="30" required>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label is-required">登录密码：</label>
                        <div class="col-sm-8">
                            <div class="input-group">
                                <input id="password" name="password" placeholder="请输入登录密码" class="form-control" type="password" th:value="${@config.getKey('sys.user.initPassword')}" required>
                                <span class="input-group-addon" title="登录密码,鼠标按下显示密码"
                                    onmousedown="$('#password').attr('type','text')"
                                    onmouseup="$('#password').attr('type','password')"><i class="fa fa-key"></i></span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">用户性别：</label>
                        <div class="col-sm-8">
                            <select name="sex" class="form-control m-b" th:with="type=${@dict.getType('sys_user_sex')}">
				                <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
				            </select>
                        </div>
                    </div>
                </div>
                <div class="col-sm-6">
                    <div class="form-group">
                        <label class="col-sm-4 control-label">用户状态：</label>
                        <div class="col-sm-8">
                            <label class="toggle-switch switch-solid">
	                            <input type="checkbox" id="status" checked>
	                            <span></span>
	                        </label>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
            	<div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">岗位：</label>
                        <div class="col-xs-4">
                            <select id="post" class="form-control select2-multiple" multiple>
								<option th:each="post:${posts}" th:value="${post.postId}" th:text="${post.postName}" th:disabled="${post.status == '1'}"></option>
							</select>
                        </div>
                    </div>
                </div>
            </div>
            <div class="row">
            	<div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label is-required">角色：</label>
                        <div class="col-xs-10">
                            <select name="roleId" class="form-control m-b" required>
								<option value="">请选择角色</option>
								<option th:each="role:${roles}" th:value="${role.roleId}" th:text="${role.roleName}" th:disabled="${role.status == '1'}"></option>
							</select>
                        </div>
                    </div>
                </div>
            </div>
            <h4 class="form-header h4">其他信息</h4>
            <div class="row">
                <div class="col-sm-12">
                    <div class="form-group">
                        <label class="col-xs-2 control-label">备注：</label>
                        <div class="col-xs-10">
                            <textarea name="remark" maxlength="500" class="form-control" rows="3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
        </form>
    </div>
      
    <div class="row">
        <div class="col-sm-offset-5 col-sm-10">
            <button type="button" class="btn btn-sm btn-primary" onclick="doSubmit()"><i class="fa fa-check"></i>保 存</button>&nbsp;
            <button type="button" class="btn btn-sm btn-danger" onclick="closeItem()"><i class="fa fa-reply-all"></i>关 闭 </button>
        </div>
    </div>
	<th:block th:include="include :: footer" />
	<th:block th:include="include :: select2-js" />
	<script>
	    var prefix = ctx + "system/user";
	
        $("#form-user-add").validate({
        	onkeyup: false,
        	rules:{
        		loginName:{
        			required: true,
        			minlength: 2,
        			maxlength: 20,
        			remote: {
                        url: prefix + "/checkLoginNameUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                        	"loginName": function() {
                                return $.common.trim($("#loginName").val());
                            }
                        },
                        dataFilter: function(data, type) {
                        	return $.validate.unique(data);
                        }
                    }
        		},
        		password:{
        			required: true,
        			minlength: 5,
        			maxlength: 20
        		},
        		email:{
                    email:true,
                    remote: {
                        url: prefix + "/checkEmailUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "email": function () {
                                return $.common.trim($("#email").val());
                            }
                        },
                        dataFilter: function (data, type) {
                        	return $.validate.unique(data);
                        }
                    }
        		},
        		phonenumber:{
        			isPhone:true,
                    remote: {
                        url: prefix + "/checkPhoneUnique",
                        type: "post",
                        dataType: "json",
                        data: {
                            "phonenumber": function () {
                                return $.common.trim($("#phonenumber").val());
                            }
                        },
                        dataFilter: function (data, type) {
                        	return $.validate.unique(data);
                        }
                    }
        		},
        		roleId:{
        			required: true
        		},
        		treeId:{
        			required: true
        		},
        	},
        	messages: {
                "loginName": {
                    required: "登录账号不能为空",
                    remote: "用户已经存在"
                },
        		"password": {
        			required: "登录密码不能为空"
        		},
        		"email": {
                    remote: "Email已经存在"
                },
        		"phonenumber":{
                	remote: "手机号码已经存在"
        		},
        		"roleId":{
                	required: "角色不能为空"
        		},
        		"treeId":{
                	required: "归属部门不能为空"
        		}
            },
            focusCleanup: true
        });
        
        function doSubmit() {
			// 调试输出 - 在表单验证前检查字段值
			console.log("=== 表单验证前检查 ===");
			console.log("loginName元素值：", $("#loginName").val());
			console.log("loginName元素长度：", $("#loginName").val().length);
			console.log("loginName是否为空：", $("#loginName").val() === "");
			console.log("loginName trim后：", $.common.trim($("#loginName").val()));

			if ($.validate.form()) {
				console.log("=== 表单验证通过 ===");
				console.log("验证后loginName值：", $("#loginName").val());
				console.log("验证后password值：", $("#password").val());
	        	var chrtype = [[${#strings.defaultString(@config.getKey('sys.account.chrtype'), 0)}]];
			var password = $("#password").val();
	        	var status = $("input[id='status']").is(':checked') == true ? 0 : 1;
	        	var roleId = $("#roleId").val();
	        	var postIds = $.form.selectSelects("post");

	        	// 序列化表单获取所有字段值
	        	var formData = $("#form-user-add").serializeArray();
	        	var data = [];
	        	// 添加表单字段值
	        	$.each(formData, function(index, item) {
	        		data.push({"name": item.name, "value": item.value});
	        	});
	        	// 添加额外字段（覆盖或补充）
	        	data.push({"name": "status", "value": status});
	        	data.push({"name": "roleId", "value": roleId});
	        	data.push({"name": "postIds", "value": postIds});
	        	console.log("准备调用$.operate.saveTab，data:", data);
	        	$.operate.saveTab(prefix + "/add", data);
	        	console.log("$.operate.saveTab调用后");
	        	console.log("save后loginName值：", $("#loginName").val());
	        	console.log("save后password值：", $("#password").val());
	        }
	    }

        // 部门改变时刷新岗位列表
        function loadPostsByDept() {
            var deptId = $("#treeId").val();
            console.log("当前部门ID：" + deptId);

            $.ajax({
                url: ctx + "system/post/listByDeptId",
                type: "POST",
                data: {deptId: deptId},
                dataType: "json",
                success: function(data) {
                    if (data.code === 0) {
                        var posts = data.data;
                        var $postSelect = $("#post");
                        // 清空当前选中值
                        $postSelect.val(null).trigger('change');
                        // 清空所有选项
                        $postSelect.empty();
                        if (posts && posts.length > 0) {
                            $.each(posts, function(index, post) {
                                var disabled = (post.status == '1') ? 'disabled' : '';
                                var option = new Option(post.postName, post.postId);
                                $(option).prop('disabled', disabled === 'disabled');
                                $postSelect.append(option);
                            });
                        } else {
                            var option = new Option("无可用岗位", "");
                            $postSelect.append(option);
                        }
                        // 触发change事件更新select2显示
                        $postSelect.trigger('change');
                    } else {
                        console.error("加载岗位失败：" + data.msg);
                    }
                },
                error: function(xhr, status, error) {
                    console.error("请求岗位失败：" + error);
                }
            });
        }

        // 加载部门列表
        function loadDeptList() {
            $.get(ctx + "system/dept/treeData", function(data) {
                var $deptSelect = $("#treeId");
                $deptSelect.empty();
                $deptSelect.append('<option value="">请选择部门</option>');
                if (data && data.length > 0) {
                    $.each(data, function(index, dept) {
                        var option = new Option(dept.name, dept.id);
                        $deptSelect.append(option);
                    });
                }
            });
        }

        $(function() {
            // 加载部门列表
            loadDeptList();
            // 初始化岗位下拉框
            $('#post').select2({
                multiple: true,
                placeholder: "请选择岗位",
                allowClear: true
            });
            // 监听部门选择框变化，刷新岗位列表
            $("#treeId").on('change', function() {
                loadPostsByDept();
            });
        })

        /* 用户管理-新增-选择部门树 */
        function selectDeptTree() {
        	var treeId = $("#treeId").val();
        	var deptId = $.common.isEmpty(treeId) ? "100" : $("#treeId").val();
        	var url = ctx + "system/dept/selectDeptTree/" + deptId;
			var options = {
				title: '选择部门',
				width: "380",
				url: url,
				callBack: doSelectDept
			};
			$.modal.openOptions(options);
		}

		function doSelectDept(index, layero){
			var tree = layero.find("iframe")[0].contentWindow.$._tree;
			var body = $.modal.getChildFrame(index);
   			$("#treeId").val(body.find('#treeId').val());
   			$("#treeName").val(body.find('#treeName').val());
   			$.modal.close(index);
		}
    </script>
</body>
</html>

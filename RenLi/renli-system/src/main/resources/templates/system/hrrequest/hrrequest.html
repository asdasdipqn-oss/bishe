<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('培训需求列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>培训编号：</label>
                                <input type="text" name="titleId"/>
                            </li>
                            <li>
                                <label>申请部门：</label>
                                <input type="text" name="deptName"/>
                            </li>
                            <li>
                                <label>申请人：</label>
                                <input type="text" name="requestBy"/>
                            </li>
                            <li>
                                <label>培训主题：</label>
                                <input type="text" name="trainingTopic"/>
                            </li>
                            <li>
                                <label>期望培训时长：</label>
                                <input type="text" name="expectedTime"/>
                            </li>
                            <li>
                                <label>处理状态：</label>
                                <select name="requestStatus" th:with="type=${@dict.getType('zzstatus')}">
                                    <option value="">所有</option>
                                    <option th:each="dict : ${type}" th:text="${dict.dictLabel}" th:value="${dict.dictValue}"></option>
                                </select>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:hrrequest:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:hrrequest:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:hrrequest:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:hrrequest:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:hrrequest:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:hrrequest:remove')}]];
        var requestStatusDatas = [[${@dict.getType('zzstatus')}]];
        var prefix = ctx + "system/hrrequest";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "培训需求",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '主键ID',
                    visible: false
                },
                {
                    field: 'titleId',
                    title: '培训编号'
                },
                {
                    field: 'deptName',
                    title: '申请部门'
                },
                {
                    field: 'requestBy',
                    title: '申请人'
                },
                {
                    field: 'trainingTopic',
                    title: '培训主题'
                },
                {
                    field: 'reason',
                    title: '申请理由'
                },
                {
                    field: 'expectedTime',
                    title: '期望培训时长'
                },
                {
                    field: 'requestStatus',
                    title: '处理状态',
                    formatter: function(value, row, index) {
                       return $.table.selectDictLabel(requestStatusDatas, value);
                    }
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>

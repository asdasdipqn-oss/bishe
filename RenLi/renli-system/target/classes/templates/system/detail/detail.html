<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" xmlns:shiro="http://www.pollix.at/thymeleaf/shiro">
<head>
    <th:block th:include="include :: header('薪资明细列表')" />
</head>
<body class="gray-bg">
     <div class="container-div">
        <div class="row">
            <div class="col-sm-12 search-collapse">
                <form id="formId">
                    <div class="select-list">
                        <ul>
                            <li>
                                <label>员工：</label>
                                <input type="text" name="employee"/>
                            </li>
                            <li>
                                <label>部门：</label>
                                <input type="text" name="dept"/>
                            </li>
                            <li>
                                <label>薪资月份：</label>
                                <input type="text" name="salaryMonth"/>
                            </li>
                            <li>
                                <label>基本工资：</label>
                                <input type="text" name="baseSalary"/>
                            </li>
                            <li>
                                <label>绩效奖金：</label>
                                <input type="text" name="performanceBonus"/>
                            </li>
                            <li>
                                <label>福利奖金：</label>
                                <input type="text" name="overtimePay"/>
                            </li>
                            <li>
                                <label>扣款：</label>
                                <input type="text" name="deduction"/>
                            </li>
                            <li>
                                <label>实发工资：</label>
                                <input type="text" name="netSalary"/>
                            </li>
                            <li>
                                <a class="btn btn-primary btn-rounded btn-sm" onclick="$.table.search()"><i class="fa fa-search"></i>&nbsp;搜索</a>
                                <a class="btn btn-warning btn-rounded btn-sm" onclick="$.form.reset()"><i class="fa fa-refresh"></i>&nbsp;重置</a>
                            </li>
                        </ul>
                    </div>
                </form>
            </div>

            <div class="btn-group-sm" id="toolbar" role="group">
                <a class="btn btn-success" onclick="$.operate.add()" shiro:hasPermission="system:detail:add">
                    <i class="fa fa-plus"></i> 添加
                </a>
                <a class="btn btn-primary single disabled" onclick="$.operate.edit()" shiro:hasPermission="system:detail:edit">
                    <i class="fa fa-edit"></i> 修改
                </a>
                <a class="btn btn-danger multiple disabled" onclick="$.operate.removeAll()" shiro:hasPermission="system:detail:remove">
                    <i class="fa fa-remove"></i> 删除
                </a>
                <a class="btn btn-warning" onclick="$.table.exportExcel()" shiro:hasPermission="system:detail:export">
                    <i class="fa fa-download"></i> 导出
                </a>
            </div>
            <div class="col-sm-12 select-table table-striped">
                <table id="bootstrap-table"></table>
            </div>
        </div>
    </div>
    <th:block th:include="include :: footer" />
    <script th:inline="javascript">
        var editFlag = [[${@permission.hasPermi('system:detail:edit')}]];
        var removeFlag = [[${@permission.hasPermi('system:detail:remove')}]];
        var prefix = ctx + "system/detail";

        $(function() {
            var options = {
                url: prefix + "/list",
                createUrl: prefix + "/add",
                updateUrl: prefix + "/edit/{id}",
                removeUrl: prefix + "/remove",
                exportUrl: prefix + "/export",
                modalName: "薪资明细",
                columns: [{
                    checkbox: true
                },
                {
                    field: 'id',
                    title: '主键ID',
                    visible: false
                },
                {
                    field: 'employee',
                    title: '员工'
                },
                {
                    field: 'dept',
                    title: '部门'
                },
                {
                    field: 'salaryMonth',
                    title: '薪资月份'
                },
                {
                    field: 'baseSalary',
                    title: '基本工资'
                },
                {
                    field: 'performanceBonus',
                    title: '绩效奖金'
                },
                {
                    field: 'overtimePay',
                    title: '福利奖金'
                },
                {
                    field: 'deduction',
                    title: '扣款'
                },
                {
                    field: 'netSalary',
                    title: '实发工资'
                },
                {
                    field: 'detailInfo',
                    title: '详情'
                },
                {
                    title: '操作',
                    align: 'center',
                    formatter: function(value, row, index) {
                        var actions = [];
                        actions.push('<a class="btn btn-success btn-xs ' + editFlag + '" href="javascript:void(0)" onclick="$.operate.edit(\'' + row.id + '\')"><i class="fa fa-edit"></i>编辑</a> ');
                        actions.push('<a class="btn btn-danger btn-xs ' + removeFlag + '" href="javascript:void(0)" onclick="$.operate.remove(\'' + row.id + '\')"><i class="fa fa-remove"></i>删除</a>');
                        return actions.join('');
                    }
                }]
            };
            $.table.init(options);
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh" xmlns:th="http://www.thymeleaf.org" >
<head>
    <th:block th:include="include :: header('修改考勤异常申请')" />
    <th:block th:include="include :: datetimepicker-css" />
    <th:block th:include="include :: summernote-css" />
</head>
<body class="white-bg">
    <div class="wrapper wrapper-content animated fadeInRight ibox-content">
        <form class="form-horizontal m" id="form-ygexception-edit" th:object="${csAttendanceYgexception}">
            <input name="id" th:field="*{id}" type="hidden">
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">员工：</label>
                <div class="col-sm-8">
                    <input name="employee" id="employee" th:field="*{employee}" class="form-control" type="text" required readonly>
                </div>
            </div>
            <div class="form-group">
                <label class="col-sm-3 control-label is-required">部门：</label>
                <div class="col-sm-8">
                    <input name="dept" id="dept" th:field="*{dept}" class="form-control" type="text" required readonly>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label is-required">异常日期：</label>
                <div class="col-sm-8">
                    <div class="input-group date">
                        <input name="exceptionDate" th:value="${#dates.format(csAttendanceYgexception.exceptionDate, 'yyyy-MM-dd')}" class="form-control" placeholder="yyyy-MM-dd" type="text" required>
                        <span class="input-group-addon"><i class="fa fa-calendar"></i></span>
                    </div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">说明：</label>
                <div class="col-sm-8">
                    <input type="hidden" class="form-control" th:field="*{explanation}">
                    <div class="summernote" id="explanation"></div>
                </div>
            </div>
            <div class="form-group">    
                <label class="col-sm-3 control-label">处理状态：</label>
                <div class="col-sm-8">
                    <div class="radio-box" th:each="dict : ${@dict.getType('zcstatus')}">
                        <input type="radio" th:id="${'exceptionStatus_' + dict.dictCode}" name="exceptionStatus" th:value="${dict.dictValue}" th:field="*{exceptionStatus}">
                        <label th:for="${'exceptionStatus_' + dict.dictCode}" th:text="${dict.dictLabel}"></label>
                    </div>
                </div>
            </div>
        </form>
    </div>
    <th:block th:include="include :: footer" />
    <th:block th:include="include :: datetimepicker-js" />
    <th:block th:include="include :: summernote-js" />
    <script th:inline="javascript">
        var prefix = ctx + "/system/ygexception";
        $("#form-ygexception-edit").validate({
            focusCleanup: true
        });

        function submitHandler() {
            if ($.validate.form()) {
                $.operate.save(prefix + "/edit", $('#form-ygexception-edit').serialize());
            }
        }

        $("input[name='exceptionDate']").datetimepicker({
            format: "yyyy-mm-dd",
            minView: "month",
            autoclose: true
        });

        // 页面加载时自动填充员工和部门信息
        function loadCurrentUserInfo() {
            console.log('开始获取用户信息...');
            $.get(prefix + '/getCurrentUserInfo', function(result) {
                console.log('获取用户信息响应:', result);
                if (result.code == 0 && result.data) {
                    console.log('设置员工名:', result.data.userName);
                    $('#employee').val(result.data.userName);
                    if (result.data.deptName) {
                        console.log('设置部门:', result.data.deptName);
                        $('#dept').val(result.data.deptName);
                    }
                } else {
                    console.warn('返回结果异常:', result);
                }
            }).fail(function(xhr, status, error) {
                console.error('获取用户信息失败:', status, error);
            });
        }

        $(function() {
            $('.summernote').each(function(i) {
                var id = $(this).attr('id');
                $('#' + id).summernote({
                    lang: 'zh-CN',
                    dialogsInBody: true,
                    callbacks: {
                        onChange: function(contents, $edittable) {
                            $("input[name='" + id + "']").val(contents);
                        },
                        onImageUpload: function(files) {
                            var obj = this;
                            var data = new FormData();
                            data.append("file", files[0]);
                            $.ajax({
                                type: "post",
                                url: ctx + "common/upload",
                                data: data,
                                cache: false,
                                contentType: false,
                                processData: false,
                                dataType: 'json',
                                success: function(result) {
                                    if (result.code == web_status.SUCCESS) {
                                        $('#' + id).summernote('insertImage', result.url);
                                    } else {
                                        $.modal.alertError(result.msg);
                                    }
                                },
                                error: function(error) {
                                    $.modal.alertWarning("图片上传失败。");
                                }
                            });
                        }
                    }
                });
                var content = $("input[name='" + id + "']").val();
                $('#' + id).summernote('code', content);
            })
        });
    </script>
</body>
</html>
